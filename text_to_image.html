<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เครื่องมือสร้างรูปภาพข้อความ (16:9)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
    /* บังคับสัดส่วน 16:9 ให้เป๊ะๆ สำหรับ Capture */
    .ratio-16-9 { aspect-ratio: 16 / 9; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

  <div class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-3 gap-6">
    
    <!-- แผงควบคุม (ซ้าย) -->
    <div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200 col-span-1 h-fit">
      <h2 class="text-xl font-bold text-slate-800 border-b pb-3 mb-4"><i class="fa-solid fa-pen-to-square text-blue-600"></i> ตั้งค่าข้อความ</h2>
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">พิมพ์ข้อความของคุณ:</label>
          <textarea id="textInput" oninput="updatePreview()" class="w-full border p-3 rounded-xl h-32 text-sm focus:border-blue-500 outline-none" placeholder="พิมพ์ข้อความที่ต้องการ..."></textarea>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">สีพื้นหลัง:</label>
            <input type="color" id="bgColor" oninput="updatePreview()" value="#1e293b" class="w-full h-10 rounded cursor-pointer border p-1">
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">สีตัวอักษร:</label>
            <input type="color" id="textColor" oninput="updatePreview()" value="#ffffff" class="w-full h-10 rounded cursor-pointer border p-1">
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">ขนาดตัวอักษร:</label>
          <input type="range" id="textSize" oninput="updatePreview()" min="16" max="120" value="48" class="w-full accent-blue-600">
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">การจัดวาง:</label>
          <select id="textAlign" onchange="updatePreview()" class="w-full border p-2 rounded-lg text-sm outline-none">
            <option value="text-left">ชิดซ้าย</option>
            <option value="text-center" selected>กึ่งกลาง</option>
            <option value="text-right">ชิดขวา</option>
          </select>
        </div>
      </div>

      <button onclick="downloadImage()" class="w-full mt-6 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow transition flex items-center justify-center gap-2">
        <i class="fa-solid fa-download"></i> ดาวน์โหลดเป็นรูปภาพ (PNG)
      </button>

      <a href="home.html" class="block text-center mt-4 text-slate-500 hover:text-slate-800 text-sm font-bold"><i class="fa-solid fa-arrow-left"></i> กลับเมนูหลัก</a>
    </div>

    <!-- พื้นที่แสดงผล (ขวา) -->
    <div class="col-span-1 md:col-span-2 flex flex-col gap-2">
      <div class="text-sm font-bold text-slate-500"><i class="fa-solid fa-display"></i> ภาพตัวอย่าง (สัดส่วน 16:9)</div>
      
      <!-- 🌟 บล็อกนี้คือตัวที่จะถูก Capture เป็นรูป -->
      <div class="overflow-hidden border-4 border-dashed border-slate-300 rounded-xl bg-white p-2">
        <div id="captureBlock" class="ratio-16-9 w-full flex items-center p-8 lg:p-12 overflow-hidden shadow-sm" style="background-color: #1e293b;">
          <div id="previewText" class="w-full whitespace-pre-wrap font-bold leading-relaxed text-center" style="color: #ffffff; font-size: 48px;">
ข้อความตัวอย่าง
          </div>
        </div>
      </div>
      <div class="text-xs text-slate-400 mt-1">* รูปภาพที่ดาวน์โหลดจะมีความคมชัดสูง (Scale 2x) เหมาะสำหรับส่งเข้า LINE</div>
    </div>

  </div>

  <script>
    function updatePreview() {
      const text = document.getElementById('textInput').value || 'ข้อความตัวอย่าง';
      const bgColor = document.getElementById('bgColor').value;
      const textColor = document.getElementById('textColor').value;
      const textSize = document.getElementById('textSize').value;
      const textAlign = document.getElementById('textAlign').value;

      const block = document.getElementById('captureBlock');
      const preview = document.getElementById('previewText');

      preview.innerText = text;
      block.style.backgroundColor = bgColor;
      preview.style.color = textColor;
      preview.style.fontSize = textSize + 'px';
      
      // อัปเดตคลาสจัดตำแหน่ง
      preview.className = `w-full whitespace-pre-wrap font-bold leading-relaxed ${textAlign}`;
    }

    function downloadImage() {
      const captureArea = document.getElementById('captureBlock');
      
      Swal.fire({ title: 'กำลังสร้างรูปภาพ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      html2canvas(captureArea, { scale: 2, useCORS: true }).then(canvas => {
        let dataUrl = canvas.toDataURL('image/png');
        var link = document.createElement('a'); 
        link.download = `Text_Image_${new Date().getTime()}.png`; 
        link.href = dataUrl; 
        link.click();

        Swal.fire('สำเร็จ!', 'ดาวน์โหลดรูปภาพเรียบร้อยแล้ว', 'success');
      }).catch(err => {
        Swal.fire('ข้อผิดพลาด', 'ไม่สามารถสร้างรูปภาพได้: ' + err, 'error');
      });
    }
  </script>
</body>
</html>
