  <script>
    let currentData = null;

    // ⚡️ แก้ปัญหาโหลดค้างด้วย DOMContentLoaded ที่เสถียรที่สุด
    document.addEventListener('DOMContentLoaded', function() {
       initPage();
    });

    function initPage() {
      try {
        const dateInput = document.getElementById('targetDate');
        if (!dateInput.value) {
           const today = new Date();
           const yyyy = today.getFullYear();
           const mm = String(today.getMonth() + 1).padStart(2, '0');
           const dd = String(today.getDate()).padStart(2, '0');
           dateInput.value = `${yyyy}-${mm}-${dd}`;
        }

        // ซิงค์ Checkbox การ์ดพิเศษ เผื่อเบราว์เซอร์จำค่าไว้
        const chkUni = document.getElementById('chkUniversal');
        if(chkUni && chkUni.checked) {
           toggleUniversalWrapper(chkUni);
        }

        // เริ่มโหลดข้อมูลทันที
        fetchData();
      } catch(e) {
        console.error("Init Error:", e);
      }
    }

    function toggleUniversalWrapper(chk) {
      document.getElementById('universalWrapper').style.display = chk.checked ? 'flex' : 'none';
      if(chk.checked && document.querySelectorAll('.uni-card-item').length === 0) {
         addUniversalCard(); 
      }
    }

    function switchContentType(sel) {
      const card = sel.closest('.uni-card-item');
      const txtGrp = card.querySelector('.u-text-group');
      const imgGrp = card.querySelector('.u-image-group');
      
      if(sel.value === 'text') {
          txtGrp.style.display = 'flex'; imgGrp.style.display = 'none';
      } else if (sel.value === 'image') {
          txtGrp.style.display = 'none'; imgGrp.style.display = 'flex';
      } else {
          txtGrp.style.display = 'none'; imgGrp.style.display = 'none';
      }
    }

    function addUniversalCard() {

      const html = `

                <option value="mega">Mega (กว้างปกติ)</option>
                <option value="kilo">Kilo (แคบกว่าปกติ)</option>
             </select>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

             <div class="flex flex-col gap-2 p-3 bg-slate-50 rounded border">

                </label>

                   <input type="text" class="u-title p-2 border rounded text-xs flex-1" placeholder="ชื่อเรื่อง...">

             <!-- Content Selection -->

                    <select class="u-content-type p-1.5 border rounded text-xs font-bold outline-none focus:border-amber-400 bg-white cursor-pointer" onchange="switchContentType(this)">

                        <option value="none">❌ ไม่แสดงเนื้อหา</option>
                    </select>
                </div>
                
                <div class="u-text-group flex flex-col gap-2 mt-1 border-t pt-2 border-slate-200">

                </label>
             </div>
          </div>
        </div>
      `;
      container.insertAdjacentHTML('beforeend', html);
    }

    function fetchData() {
      let dateStr = document.getElementById('targetDate').value;
      if(!dateStr) {
         // Fallback หากเกิดบั๊กไม่มีวันที่
         const today = new Date();
         dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
         document.getElementById('targetDate').value = dateStr;
      }
      
      const btn = document.getElementById('btnFetch');
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; 
      btn.disabled = true;
      document.getElementById('btnSend').disabled = true; 
      document.getElementById('btnSend').classList.replace('bg-emerald-600', 'bg-slate-400');

      google.script.run.withSuccessHandler(res => {
        currentData = res;
        updateUI('Fire', res.fire.hasData, `PM2.5: ${res.fire.avgPM} | Hotspot: ${res.fire.hsCount} จุด`);
        updateUI('Weir', res.weir.hasData, `${res.weir.unit} (${res.weir.count} ฝาย)`);
        updateUI('Forest', res.forest.hasData, `${res.forest.unit} (${res.forest.count} ต้น)`);
        btn.innerHTML = '<i class="fa-solid fa-rotate"></i> ดึงข้อมูล'; 
        btn.disabled = false;
        document.getElementById('btnSend').disabled = false; 
        document.getElementById('btnSend').classList.replace('bg-slate-400', 'bg-emerald-600');
      }).withFailureHandler(err => {
        btn.innerHTML = '<i class="fa-solid fa-rotate"></i> ดึงข้อมูล'; 
        btn.disabled = false;
        Swal.fire('ข้อผิดพลาดระบบ', err.toString(), 'error');
      }).getAdminDashboardData(dateStr);
    }

    function updateUI(type, hasData, text) {
      const statusEl = document.getElementById('status' + type); const boxEl = document.getElementById('box' + type); const chkEl = document.getElementById('chk' + type);
      if(hasData) { statusEl.innerHTML = `<span class="text-emerald-600 font-bold"><i class="fa-solid fa-check-circle"></i> มีข้อมูล:</span> ${text}`; boxEl.classList.remove('opacity-50'); chkEl.checked = true; chkEl.disabled = false; } 
      else { statusEl.innerHTML = `<span class="text-red-500 font-bold"><i class="fa-solid fa-xmark-circle"></i> ไม่มีข้อมูล</span>`; boxEl.classList.add('opacity-50'); chkEl.checked = false; chkEl.disabled = true; }
    }

      if(!sendFire && !sendWeir && !sendForest && (!sendUni || uniNodes.length === 0)) return Swal.fire('แจ้งเตือน', 'กรุณาเลือกการ์ดอย่างน้อย 1 ใบครับ', 'warning');

            <div class="bg-[#dc2626] text-white text-[13px] font-bold text-center py-2">🚨 รายงานสถานการณ์ไฟป่าและฝุ่น</div>
            <div class="h-32 bg-cover bg-center" style="background-image: url('${img}')"></div>
            <div class="p-4 text-xs text-slate-700 space-y-2 flex-1">
              <div class="bg-blue-50 p-3 rounded-lg border border-blue-100"><div class="font-bold text-blue-600 mb-1">ภาพรวม PM2.5 ภาคเหนือ</div><div class="text-xl font-bold text-slate-800">${currentData.fire.avgPM} µg/m³</div></div>
              <div class="font-bold text-red-600">🔥 จุดความร้อนรวม: ${currentData.fire.hsCount} จุด</div>
              <div class="text-center pt-4 text-slate-400 text-[10px] mt-auto border-t border-slate-100">ปุ่ม: อ่านรายละเอียด | 📤 แชร์ต่อ</div>

          </div>

            <div class="bg-[#111827] p-3 flex items-center justify-between"><div class="w-8 h-8 bg-white/20 rounded-full"></div><div class="text-xs text-white font-bold">ศนป.กอ.รมน.ภาค 3</div><div class="w-8 h-8 bg-white/20 rounded-full"></div></div>
            <div class="bg-[#0284c7] text-white text-[13px] font-bold text-center py-2">💧 รายงานสรุปการสร้าง/ซ่อมแซมฝาย</div>
            <div class="h-32 bg-cover bg-center" style="background-image: url('${img}')"></div>
            <div class="p-4 text-xs text-slate-700 space-y-3 flex-1 flex flex-col">
              <div class="flex justify-between border-b pb-2"><span class="text-slate-500">หน่วยดำเนินการ:</span> <span class="font-bold text-right">${currentData.weir.unit}</span></div>
              <div class="flex justify-between border-b pb-2"><span class="text-slate-500">ประเภทฝาย:</span> <span class="font-bold text-right">${currentData.weir.type}</span></div>
              <div class="text-center pt-4 text-slate-400 text-[10px] mt-auto border-t border-slate-100">ปุ่ม: อ่านรายละเอียด | 📤 แชร์ต่อ</div>

          <div class="min-w-[280px] w-[280px] bg-white border border-slate-300 rounded-[16px] overflow-hidden shadow-md flex-shrink-0 snap-center text-left flex flex-col">

            <div class="h-32 bg-cover bg-center" style="background-image: url('${img}')"></div>
            <div class="p-4 text-xs text-slate-700 space-y-3 flex-1 flex flex-col">
              <div class="flex justify-between border-b pb-2"><span class="text-slate-500">หน่วยดำเนินการ:</span> <span class="font-bold text-right">${currentData.forest.unit}</span></div>
              <div class="flex justify-between border-b pb-2"><span class="text-slate-500">จำนวนต้นไม้:</span> <span class="font-bold text-right">${currentData.forest.count} ต้น</span></div>
              <div class="text-center pt-4 text-slate-400 text-[10px] mt-auto border-t border-slate-100">ปุ่ม: อ่านรายละเอียด | 📤 แชร์ต่อ</div>
            </div>
          </div>
        `;
      }

      let universalList = [];
      if(sendUni) {
        uniNodes.forEach(card => {
          let uBubbleSize = card.querySelector('.u-bubble-size').value;
          let uChkHeader = card.querySelector('.u-chk-header').checked;
          let uTitle = card.querySelector('.u-title').value || '📌 ภารกิจพิเศษ';
          let uColor = card.querySelector('.u-color').value;
          let uChkImage = card.querySelector('.u-chk-image').checked;
          let uImage = card.querySelector('.u-image').value || 'https://images.unsplash.com/photo-1532601224476-15c79f2f7a51?q=80&w=800';
          
          let uContentType = card.querySelector('.u-content-type').value;
          let uTextSize = card.querySelector('.u-text-size').value;
          let uText = card.querySelector('.u-text').value || '';
          let uBodyImage = card.querySelector('.u-body-image').value || '';
          let uBodyImageRatio = card.querySelector('.u-body-image-ratio').value;
          
          let uChkButton = card.querySelector('.u-chk-button').checked;
          let uChkShare = card.querySelector('.u-chk-share').checked;
          let uLink = card.querySelector('.u-link').value;

          universalList.push({
             bubbleSize: uBubbleSize, title: uTitle, color: uColor, 
             image: uImage, text: uText, textSize: uTextSize, link: uLink,
             contentType: uContentType, bodyImage: uBodyImage, bodyImageRatio: uBodyImageRatio,
             toggles: { header: uChkHeader, image: uChkImage, button: uChkButton, share: uChkShare }
          });

          let widthClass = "min-w-[280px] w-[280px]";
          if(uBubbleSize === "mega") widthClass = "min-w-[260px] w-[260px]";
          if(uBubbleSize === "kilo") widthClass = "min-w-[220px] w-[220px]";

          let textSizeClass = "text-[13px]"; 
          if (uTextSize === "xs") textSizeClass = "text-[11px]";
          if (uTextSize === "md") textSizeClass = "text-[15px]";
          if (uTextSize === "lg") textSizeClass = "text-[17px]";
          if (uTextSize === "xl") textSizeClass = "text-[19px]";

          let headerHtml = '';
          if(uChkHeader) {
             headerHtml = `
              <div class="bg-[#111827] p-3 flex items-center justify-between"><div class="w-8 h-8 bg-white/20 rounded-full"></div><div class="text-xs text-white font-bold">ศนป.กอ.รมน.ภาค 3</div><div class="w-8 h-8 bg-white/20 rounded-full"></div></div>
              <div style="background-color: ${uColor};" class="text-white text-[13px] font-bold text-center py-2">${uTitle}</div>`;
          }
          let imgHtml = '';
          if(uChkImage) imgHtml = `<div class="h-32 bg-cover bg-center" style="background-image: url('${uImage}')"></div>`;

          let bodyHtml = '';
          if(uContentType !== 'none' || uChkButton || uChkShare) {
             let contentHtml = '';
             if(uContentType === 'text' && uText) {
                contentHtml = `<div class="mb-2 whitespace-pre-wrap leading-relaxed ${textSizeClass}">${uText}</div>`;
             } else if(uContentType === 'image' && uBodyImage) {
                let arParts = uBodyImageRatio.split(':');
                let pb = (arParts[1] / arParts[0]) * 100; 
                contentHtml = `
                  <div class="relative w-full rounded border mb-2 overflow-hidden bg-slate-50" style="padding-bottom: ${pb}%;">
                     <img src="${uBodyImage}" class="absolute top-0 left-0 w-full h-full object-contain">
                  </div>`;
             }

             bodyHtml = `<div class="p-4 text-slate-700 space-y-2 flex-1 flex flex-col">
                ${contentHtml}
                <div class="text-center pt-4 text-slate-400 text-[10px] mt-auto border-t border-slate-100">
                  ปุ่ม: ${uChkButton ? 'อ่านเพิ่มเติม' : ''} ${uChkShare ? '| 📤 แชร์ต่อ' : ''}
                </div>
             </div>`;
          }

          cardsHtml += `<div class="${widthClass} bg-white border border-slate-300 rounded-[16px] overflow-hidden shadow-md flex-shrink-0 snap-center text-left flex flex-col">${headerHtml}${imgHtml}${bodyHtml}</div>`;
        });
      }

      let previewHTML = `
        <div class="text-left text-sm mb-3 font-bold text-slate-700"><i class="fa-solid fa-mobile-screen-button mr-1"></i> ภาพจำลองการแสดงผลบนมือถือ:</div>
        <div class="flex overflow-x-auto gap-4 pb-4 px-2 snap-x hide-scroll bg-slate-100 py-6 rounded-xl border-y border-slate-300 shadow-inner">
          ${cardsHtml}
        </div>
        <div class="text-[11px] text-red-500 mt-4 text-left font-bold">* จำลองผลลัพธ์คร่าวๆ (ขนาดและการตัดคำใน LINE อาจแตกต่างเล็กน้อย)</div>
      `;

      Swal.fire({
        title: 'ตรวจสอบก่อนส่ง (Preview)',
        html: previewHTML,
        width: 'auto',
        padding: '1em',
        showCancelButton: true,
        confirmButtonText: '<i class="fa-regular fa-paper-plane"></i> ยืนยันส่งเข้า LINE',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#059669',
        customClass: { popup: 'rounded-3xl' }
      }).then((result) => {
        if (result.isConfirmed) executeSend(sendFire, sendWeir, sendForest, sendUni, universalList);
      });
    }

    function executeSend(sendFire, sendWeir, sendForest, sendUni, universalList) {
      const payload = {
        date: document.getElementById('targetDate').value,
        target: document.getElementById('targetGroup').value,
        cards: { fire: sendFire, weir: sendWeir, forest: sendForest, universal: sendUni },
        images: { fire: document.getElementById('imgFire').value, weir: document.getElementById('imgWeir').value, forest: document.getElementById('imgForest').value },
        data: currentData,
        universalList: universalList 
      };
      
      Swal.fire({ title: 'กำลังยิงข้อมูลเข้า LINE...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      google.script.run.withSuccessHandler(res => {
        if(res.status === 'success') Swal.fire('สำเร็จ!', res.message, 'success'); else Swal.fire('ผิดพลาด!', res.message, 'error');
      }).withFailureHandler(err => {
        Swal.fire('ข้อผิดพลาดระบบ', err.toString(), 'error');
      }).sendReportToLine(payload);
    }
  </script>
</body>
</html>
