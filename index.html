<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบแชร์รายงาน ศนป.กอ.รมน.ภาค 3</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90vh; }
    .container { width: 100%; max-width: 500px; background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; padding-bottom: 25px; border: 1px solid #e2e8f0; }
    .header { background: #111827; color: white; padding: 20px; text-align: center; border-bottom: 4px solid #3b82f6; }
    .header h2 { margin: 0; font-size: 20px; font-weight: bold; }
    .header p { margin: 5px 0 0 0; font-size: 13px; color: #94a3b8; }
    .content { padding: 25px; }
    .instruction { font-size: 14px; color: #475569; font-weight: bold; margin-bottom: 15px; }
    .checkbox-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
    .checkbox-card { display: flex; align-items: center; padding: 15px; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 10px; cursor: pointer; }
    .checkbox-card input { width: 20px; height: 24px; cursor: pointer; margin-right: 15px; }
    .checkbox-label { font-size: 14px; font-weight: bold; color: #1e293b; }
    .btn-share { width: 100%; background: #06C755; color: white; border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(6,199,85,0.2); }
    .btn-share:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; box-shadow: none; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>ศนป.กอ.รมน.ภาค 3</h2>
    <p>ศูนย์รวมการแชร์รายงานบูรณาการ (Carousel)</p>
  </div>
  <div class="content">
    <div class="instruction" id="statusText">⏳ กำลังโหลดข้อมูลล่าสุดจาก Sheets...</div>
    <div class="checkbox-group">
      <label class="checkbox-card"><input type="checkbox" id="chkFire" checked><span class="checkbox-label">🔥 รายงานไฟป่าและฝุ่น</span></label>
      <label class="checkbox-card"><input type="checkbox" id="chkWeir" checked><span class="checkbox-label">💧 รายงานการสร้างฝาย</span></label>
      <label class="checkbox-card"><input type="checkbox" id="chkForest" checked><span class="checkbox-label">🌳 รายงานปลูกป่าทดแทน</span></label>
    </div>
    <button class="btn-share" id="shareBtn" onclick="processAndShare()" disabled>⏳ รอสักครู่...</button>
  </div>
</div>

<script>
  // 🚨 กำหนดตัวแปร LIFF และ API URL ล่าสุดของคุณ
  const MY_LIFF_ID = "2010468749-0aq8Z3bf"; 
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwdkeaxpJXAhKnb_d0qMoVZvDY1c4snIqFqECqjxY7ZEDwsDxDA_TZZpdd7FIM9FPvpXg/exec";

  // ลิงก์รูปโลโก้ (แปลงเป็น https:// แล้ว)
  const LOGO_LEFT = "https://lh3.googleusercontent.com/d/1BN7SKJAsPCyBx3cUV_LNDXRcjnP86Th1";
  const LOGO_RIGHT_FIRE = "https://lh3.googleusercontent.com/d/1vereUg2XeLoYyKQSiamrJpaHNgmrgwj4";
  const LOGO_RIGHT_WF = "https://lh3.googleusercontent.com/d/1PBPcdEyPAVRUinc_9V5TrDxhMNOPS64K";

  let serverData = null;

  window.onload = async function() {
    try {
      await liff.init({ liffId: MY_LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      
      const script = document.createElement('script');
      script.src = GAS_API_URL + "?callback=liffCallback";
      document.body.appendChild(script);

    } catch (err) {
      document.getElementById('statusText').innerText = "❌ เกิดข้อผิดพลาด Init: " + err.message;
    }
  };

  function liffCallback(data) {
    if(data) {
      if(data.error) {
        document.getElementById('statusText').innerText = "❌ Error จาก Sheet: " + data.error;
        return;
      }
      serverData = data;
      document.getElementById('statusText').innerText = "💡 กรุณาติ๊กเลือกการ์ดที่ต้องการส่งรวมกัน:";
      document.getElementById('shareBtn').disabled = false;
      document.getElementById('shareBtn').innerText = "💬 ส่งรายงานเข้าแชท LINE";
    } else {
      document.getElementById('statusText').innerText = "❌ ไม่พบข้อมูลจากระบบ";
    }
  }

  async function processAndShare() {
    if (!serverData) return;
    const btn = document.getElementById('shareBtn');
    btn.disabled = true; btn.innerText = "⏳ กำลังสร้างขบวนการ์ด...";

    const fireBubble = generateFireBubbleCode();
    const weirBubble = generateWeirBubbleCode();
    const forestBubble = generateForestBubbleCode();

    let selectedBubbles = [];
    if (document.getElementById('chkFire').checked)   selectedBubbles.push(fireBubble);
    if (document.getElementById('chkWeir').checked)   selectedBubbles.push(weirBubble);
    if (document.getElementById('chkForest').checked) selectedBubbles.push(forestBubble);

    if (selectedBubbles.length === 0) {
      alert("⚠️ กรุณาเลือกเรื่องที่ต้องการแชร์อย่างน้อย 1 ใบครับ");
      btn.disabled = false; btn.innerText = "💬 ส่งรายงานเข้าแชท LINE";
      return;
    }

    let finalContents = selectedBubbles.length === 1 ? selectedBubbles[0] : { "type": "carousel", "contents": selectedBubbles };

    try {
      await liff.shareTargetPicker([{
        "type": "flex",
        "altText": "📋 รายงานบูรณาการ ศนป.กอ.รมน.ภาค 3",
        "contents": finalContents
      }]);
      liff.closeWindow();
    } catch (e) {
      btn.disabled = false; 
      btn.innerText = "💬 ส่งรายงานเข้าแชท LINE";
      alert("❌ ไม่สามารถแชร์การ์ดได้\nสาเหตุ: " + e.message);
    }
  }

  function generateFireBubbleCode() {
    let hsBox = {};
    if (serverData.totalHS === 0) {
      hsBox = { "type": "box", "layout": "vertical", "margin": "sm", "spacing": "xs", "contents": [{ "type": "box", "layout": "vertical", "paddingAll": "12px", "backgroundColor": "#f8fafc", "cornerRadius": "sm", "alignItems": "center", "contents": [{ "type": "text", "text": "🍃 ตรวจไม่พบจุดความร้อน", "size": "sm", "color": "#64748b", "weight": "bold", "align": "center" }]}] };
    } else {
      let rows = serverData.top3HS.map((h, i) => ({ "type": "box", "layout": "horizontal", "paddingAll": "8px", "backgroundColor": "#f8fafc", "cornerRadius": "sm", "alignItems": "center", "contents": [{ "type": "text", "text": (i+1)+".", "weight": "bold", "size": "sm", "color": "#dc2626", "flex": 1 }, { "type": "text", "text": "จ." + h.name, "size": "sm", "color": "#334155", "flex": 7 }, { "type": "text", "text": h.count + " จุด", "weight": "bold", "size": "sm", "color": "#0f172a", "flex": 3, "align": "end" }] }));
      hsBox = { "type": "box", "layout": "vertical", "margin": "sm", "spacing": "xs", "contents": rows };
    }

    let p = Number(serverData.avgPM);
    let pmColor = "#0284c7"; let pmBg = "#f0f9ff"; let pmBorder = "#bae6fd";
    if(p > 15.0) { pmColor = "#16a34a"; pmBg = "#f0fdf4"; pmBorder = "#bbf7d0"; }
    if(p > 25.0) { pmColor = "#ca8a04"; pmBg = "#fefce8"; pmBorder = "#fef08a"; }
    if(p > 37.5) { pmColor = "#ea580c"; pmBg = "#fff7ed"; pmBorder = "#fed7aa"; }
    if(p > 75.0) { pmColor = "#dc2626"; pmBg = "#fef2f2"; pmBorder = "#fca5a5"; }

    let pmRows = serverData.top3PM.map((r, i) => ({ "type": "box", "layout": "horizontal", "paddingAll": "8px", "backgroundColor": "#f8fafc", "cornerRadius": "sm", "alignItems": "center", "contents": [{ "type": "text", "text": (i+1)+".", "weight": "bold", "size": "sm", "color": pmColor, "flex": 1 }, { "type": "text", "text": r.area, "size": "sm", "color": "#334155", "flex": 7, "wrap": true }, { "type": "text", "text": r.value + " µg", "weight": "bold", "size": "sm", "color": "#0f172a", "flex": 4, "align": "end" }] }));

    const shareUrl = "https://liff.line.me/" + MY_LIFF_ID;

    return {
      "type": "bubble", "size": "mega", "body": {
        "type": "box", "layout": "vertical", "paddingAll": "0px", "contents": [
          { "type": "box", "layout": "vertical", "contents": [
            { "type": "box", "layout": "horizontal", "paddingAll": "15px", "backgroundColor": "#111827", "alignItems": "center", "contents": [
              { "type": "box", "layout": "vertical", "width": "40px", "height": "40px", "contents": [{ "type": "image", "url": LOGO_LEFT, "size": "full" }] },
              { "type": "box", "layout": "vertical", "flex": 4, "justifyContent": "center", "contents": [{ "type": "text", "text": "ศนป.กอ.รมน.ภาค 3", "weight": "bold", "color": "#ffffff", "align": "center", "size": "md", "wrap": true }] },
              { "type": "box", "layout": "vertical", "width": "40px", "height": "40px", "backgroundColor": "#ffffff", "cornerRadius": "100px", "paddingAll": "4px", "contents": [{ "type": "image", "url": LOGO_RIGHT_FIRE, "size": "full" }] }
            ]}, 
            { "type": "box", "layout": "vertical", "backgroundColor": "#dc2626", "paddingAll": "10px", "contents": [{ "type": "text", "text": "🚨 รายงานสถานการณ์ไฟป่าและฝุ่น", "color": "#ffffff", "weight": "bold", "align": "center", "size": "sm", "wrap": true }] }
          ]},
          { "type": "box", "layout": "vertical", "paddingAll": "15px", "spacing": "md", "contents": [
              { "type": "box", "layout": "vertical", "backgroundColor": pmBg, "borderColor": pmBorder, "borderWidth": "1px", "cornerRadius": "md", "paddingAll": "10px", "contents": [{ "type": "text", "text": "ภาพรวม PM2.5 ภาคเหนือ", "size": "xs", "color": pmColor, "weight": "bold" }, { "type": "box", "layout": "horizontal", "margin": "sm", "alignItems": "center", "contents": [{ "type": "text", "text": serverData.avgPM + " µg/m³", "size": "lg", "weight": "bold", "color": pmColor, "flex": 2 }, { "type": "box", "layout": "vertical", "backgroundColor": pmColor, "paddingAll": "4px", "cornerRadius": "sm", "flex": 2, "contents": [{ "type": "text", "text": serverData.pmImpact, "color": "#ffffff", "size": "xxs", "weight": "bold", "align": "center" }] }] }]},
              { "type": "box", "layout": "vertical", "contents": [{ "type": "text", "text": "🔥 จุดความร้อน Top 3", "weight": "bold", "size": "xs", "color": "#0f172a" }, hsBox ]},
              { "type": "box", "layout": "vertical", "contents": [{ "type": "text", "text": "😷 PM2.5 Top 3", "weight": "bold", "size": "xs", "color": "#0f172a" }, { "type": "box", "layout": "vertical", "margin": "sm", "spacing": "xs", "contents": pmRows }]},
              { "type": "box", "layout": "horizontal", "margin": "md", "spacing": "sm", "contents": [
                  { "type": "button", "style": "primary", "color": "#dc2626", "height": "sm", "action": { "type": "uri", "label": "ดูรายละเอียด", "uri": "https://www.gistda.or.th" }, "flex": 1 },
                  { "type": "button", "style": "secondary", "height": "sm", "action": { "type": "uri", "label": "📤 แชร์ต่อ", "uri": shareUrl }, "flex": 1 }
                ]}
            ]}
        ]
      }
    };
  }

  function generateWeirBubbleCode() {
    const shareUrl = "https://liff.line.me/" + MY_LIFF_ID;
    return {
      "type": "bubble", "size": "mega", "body": {
        "type": "box", "layout": "vertical", "paddingAll": "0px", "contents": [
          { "type": "box", "layout": "vertical", "contents": [
            { "type": "box", "layout": "horizontal", "paddingAll": "15px", "backgroundColor": "#111827", "alignItems": "center", "contents": [
              { "type": "box", "layout": "vertical", "width": "40px", "height": "40px", "contents": [{ "type": "image", "url": LOGO_LEFT, "size": "full" }] },
              { "type": "box", "layout": "vertical", "flex": 4, "justifyContent": "center", "contents": [{ "type": "text", "text": "ศนป.กอ.รมน.ภาค 3", "weight": "bold", "color": "#ffffff", "align": "center", "size": "md", "wrap": true }] },
              { "type": "box", "layout": "vertical", "width": "40px", "height": "40px", "backgroundColor": "#ffffff", "cornerRadius": "100px", "paddingAll": "4px", "contents": [{ "type": "image", "url": LOGO_RIGHT_WF, "size": "full" }] }
            ]}, 
            { "type": "box", "layout": "vertical", "backgroundColor": "#0284c7", "paddingAll": "10px", "contents": [{ "type": "text", "text": "💧 รายงานสรุปการสร้าง/ซ่อมแซมฝาย", "color": "#ffffff", "weight": "bold", "align": "center", "size": "sm", "wrap": true }] }
          ]},
          { "type": "box", "layout": "vertical", "paddingAll": "15px", "contents": [
              { "type": "box", "layout": "vertical", "margin": "md", "spacing": "sm", "contents": [
                  { "type": "box", "layout": "horizontal", "spacing": "sm", "contents": [{ "type": "text", "text": "หน่วยดำเนินการ:", "color": "#64748b", "size": "xs", "flex": 3, "wrap": true }, { "type": "text", "text": serverData.weir.unit, "wrap": true, "color": "#0f172a", "size": "sm", "flex": 7, "weight": "bold" }] },
                  { "type": "box", "layout": "horizontal", "spacing": "sm", "contents": [{ "type": "text", "text": "พื้นที่/พิกัด:", "color": "#64748b", "size": "xs", "flex": 3, "wrap": true }, { "type": "text", "text": serverData.weir.loc, "wrap": true, "color": "#0f172a", "size": "sm", "flex": 7, "weight": "bold" }] },
                  { "type": "box", "layout": "horizontal", "spacing": "sm", "contents": [{ "type": "text", "text": "ประเภทฝาย:", "color": "#64748b", "size": "xs", "flex": 3, "wrap": true }, { "type": "text", "text": serverData.weir.type, "wrap": true, "color": "#0f172a", "size": "sm", "flex": 7, "weight": "bold" }] },
                  { "type": "box", "layout": "horizontal", "spacing": "sm", "contents": [{ "type": "text", "text": "ขนาดฝาย:", "color": "#64748b", "size": "xs", "flex": 3, "wrap": true }, { "type": "text", "text": serverData.weir.size, "wrap": true, "color": "#0f172a", "size": "sm", "flex": 7, "weight": "bold" }] },
                  { "type": "box", "layout": "horizontal", "spacing": "sm", "contents": [{ "type": "text", "text": "จำนวน:", "color": "#64748b", "size": "xs", "flex": 3, "wrap": true }, { "type": "text", "text": serverData.weir.qty || "1 ฝาย", "wrap": true, "color": "#0f172a", "size": "sm", "flex": 7, "weight": "bold" }] },
                  { "type": "box", "layout": "horizontal", "spacing": "sm", "contents": [{ "type": "text", "text": "ประโยชน์:", "color": "#64748b", "size": "xs", "flex": 3, "wrap": true }, { "type": "text", "text": serverData.weir.benefit, "wrap": true, "color": "#0f172a", "size": "sm", "flex": 7, "weight": "bold" }] },
                  { "type": "text", "text": "🕒 ข้อมูล ณ วันที่ " + serverData.updateTime, "size": "xxs", "color": "#aaaaaa", "margin": "xl", "align": "center" },
                  { "type": "box", "layout": "horizontal", "margin": "md", "spacing": "sm", "contents": [
                      { "type": "button", "style": "primary", "color": "#0284c7", "height": "sm", "action": { "type": "uri", "label": "ดูรายละเอียด", "uri": "https://www.isoc.go.th/" }, "flex": 1 },
                      { "type": "button", "style": "secondary", "height": "sm", "action": { "type": "uri", "label": "📤 แชร์ต่อ", "uri": shareUrl }, "flex": 1 }
                    ]}
                ]}
            ]}
        ]
      }
    };
  }

  function generateForestBubbleCode() {
    const shareUrl = "https://liff.line.me/" + MY_LIFF_ID;
    return {
      "type": "bubble", "size": "mega", "body": {
        "type": "box", "layout": "vertical", "paddingAll": "0px", "contents": [
          { "type": "box", "layout": "vertical", "contents": [
            { "type": "box", "layout": "horizontal", "paddingAll": "15px", "backgroundColor": "#111827", "alignItems": "center", "contents": [
              { "type": "box", "layout": "vertical", "width": "40px", "height": "40px", "contents": [{ "type": "image", "url": LOGO_LEFT, "size": "full" }] },
              { "type": "box", "layout": "vertical", "flex": 4, "justifyContent": "center", "contents": [{ "type": "text", "text": "ศนป.กอ.รมน.ภาค 3", "weight": "bold", "color": "#ffffff", "align": "center", "size": "md", "wrap": true }] },
              { "type": "box", "layout": "vertical", "width": "40px", "height": "40px", "backgroundColor": "#ffffff", "cornerRadius": "100px", "paddingAll": "4px", "contents": [{ "type": "image", "url": LOGO_RIGHT_WF, "size": "full" }] }
            ]}, 
            { "type": "box", "layout": "vertical", "backgroundColor": "#059669", "paddingAll": "10px", "contents": [{ "type": "text", "text": "🌳 รายงานผลโครงการปลูกป่าทดแทน", "color": "#ffffff", "weight": "bold", "align": "center", "size": "sm", "wrap": true }] }
          ]},
          { "type": "image", "url": "https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?q=80&w=800", "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
          { "type": "box", "layout": "vertical", "paddingAll": "15px", "contents": [
              { "type": "box", "layout": "vertical", "margin": "sm", "spacing": "sm", "contents": [
                  { "type": "box", "layout": "horizontal", "spacing": "sm", "contents": [{ "type": "text", "text": "หน่วยดำเนินการ:", "color": "#64748b", "size": "xs", "flex": 3, "wrap": true }, { "type": "text", "text": serverData.forest.unit || "ศปป.4 กอ.รมน.ภาค 3", "wrap": true, "color": "#0f172a", "size": "sm", "flex": 7, "weight": "bold" }] },
                  { "type": "box", "layout": "horizontal", "spacing": "sm", "contents": [{ "type": "text", "text": "พื้นที่ปลูก:", "color": "#64748b", "size": "xs", "flex": 3, "wrap": true }, { "type": "text", "text": serverData.forest.loc, "wrap": true, "color": "#0f172a", "size": "sm", "flex": 7, "weight": "bold" }] },
                  { "type": "box", "layout": "horizontal", "spacing": "sm", "contents": [{ "type": "text", "text": "จำนวนต้นไม้:", "color": "#64748b", "size": "xs", "flex": 3, "wrap": true }, { "type": "text", "text": serverData.forest.qty, "wrap": true, "color": "#0f172a", "size": "sm", "flex": 7, "weight": "bold" }] },
                  { "type": "box", "layout": "horizontal", "spacing": "sm", "contents": [{ "type": "text", "text": "ชนิดพันธุ์ไม้:", "color": "#64748b", "size": "xs", "flex": 3, "wrap": true }, { "type": "text", "text": serverData.forest.type, "wrap": true, "color": "#0f172a", "size": "sm", "flex": 7, "weight": "bold" }] },
                  { "type": "box", "layout": "horizontal", "spacing": "sm", "contents": [{ "type": "text", "text": "ผู้เข้าร่วม:", "color": "#64748b", "size": "xs", "flex": 3, "wrap": true }, { "type": "text", "text": serverData.forest.people, "wrap": true, "color": "#0f172a", "size": "sm", "flex": 7, "weight": "bold" }] },
                  { "type": "text", "text": "🕒 ข้อมูล ณ วันที่ " + serverData.updateTime, "size": "xxs", "color": "#aaaaaa", "margin": "xl", "align": "center" },
                  { "type": "box", "layout": "horizontal", "margin": "lg", "spacing": "sm", "contents": [
                      { "type": "button", "style": "primary", "color": "#059669", "height": "sm", "action": { "type": "uri", "label": "ดูรายละเอียด", "uri": "https://www.isoc.go.th/" }, "flex": 1 },
                      { "type": "button", "style": "secondary", "height": "sm", "action": { "type": "uri", "label": "📤 แชร์ต่อ", "uri": shareUrl }, "flex": 1 }
                    ]}
                ]}
            ]}
        ]
      }
    };
  }
</script>
</body>
</html>
