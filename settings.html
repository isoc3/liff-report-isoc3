<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตั้งค่าระบบดึงข้อมูล</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; } </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border-t-8 border-slate-800">
    <div class="p-6 md:p-8 bg-slate-50 text-center border-b border-slate-200">
      <div class="w-16 h-16 bg-slate-800 rounded-full mx-auto mb-4 flex items-center justify-center shadow-md">
        <i class="fa-solid fa-gears text-2xl text-white"></i>
      </div>
      <h2 class="text-2xl font-bold text-slate-800">ตั้งค่าระบบดึงข้อมูล</h2>
      <p class="text-slate-500 mt-1 text-sm">กำหนดช่วงเวลาดึงค่าฝุ่น Air4Thai อัตโนมัติ</p>
    </div>

    <form id="settingsForm" class="p-6 md:p-8 space-y-6">
      
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">
          <i class="fa-regular fa-calendar-check text-emerald-600 mr-1"></i> วันที่เริ่มเก็บข้อมูล (Start Date)
        </label>
        <input type="date" id="startDate" required class="w-full border-2 border-slate-200 p-3 rounded-xl focus:border-slate-500 outline-none transition">
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">
          <i class="fa-regular fa-calendar-xmark text-red-600 mr-1"></i> วันที่สิ้นสุด (End Date)
        </label>
        <input type="date" id="endDate" required class="w-full border-2 border-slate-200 p-3 rounded-xl focus:border-slate-500 outline-none transition">
      </div>

      <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 flex gap-3 text-sm text-blue-800">
        <i class="fa-solid fa-circle-info mt-0.5"></i>
        <p>หากอยู่นอกช่วงเวลานี้ ระบบทริกเกอร์จะไม่ทำการบันทึกข้อมูลฝุ่นเข้าสู่ฐานข้อมูลครับ</p>
      </div>

      <button type="submit" id="btnSave" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-slate-900 transition text-lg flex justify-center items-center gap-2">
        <i class="fa-solid fa-floppy-disk"></i> บันทึกการตั้งค่า
      </button>

      <a href="home.html" class="block text-center mt-4 text-slate-500 hover:text-slate-800 font-semibold text-sm transition">
        🏠 กลับหน้าเมนูหลัก
      </a>
    </form>
  </div>

  <script>
    // 🚨 นำลิงก์ Web App URL (ที่มี /exec ต่อท้าย) ของคุณมาวางในเครื่องหมายคำพูดด้านล่างนี้ครับ
    const GAS_URL = "YOUR_GAS_API_URL_HERE"; 

    window.onload = () => {
      fetch(GAS_URL + "?action=get_fire_settings")
        .then(r => r.json())
        .then(data => {
          if(data.start) document.getElementById('startDate').value = data.start;
          if(data.end) document.getElementById('endDate').value = data.end;
        })
        .catch(err => console.error("Error loading settings:", err));
    };

    document.getElementById('settingsForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnSave');
      const start = document.getElementById('startDate').value;
      const end = document.getElementById('endDate').value;
      
      if(new Date(start) > new Date(end)) {
        return Swal.fire('ผิดพลาด', 'วันที่เริ่มต้น ต้องมาก่อนวันที่สิ้นสุดครับ', 'warning');
      }

      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> กำลังบันทึก...'; 
      btn.disabled = true;

      try {
        const res = await fetch(GAS_URL, {
          method: 'POST', 
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'save_fire_settings', data: { start: start, end: end } })
        }).then(r => r.json());

        btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> บันทึกการตั้งค่า'; 
        btn.disabled = false;
        
        if(res.success) {
          Swal.fire('สำเร็จ', 'บันทึกช่วงเวลาเก็บข้อมูลเรียบร้อยแล้ว', 'success');
        } else {
          Swal.fire('ผิดพลาด', res.error, 'error');
        }
      } catch (err) {
        btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> บันทึกการตั้งค่า'; 
        btn.disabled = false;
        Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้: ' + err.toString(), 'error');
      }
    };
  </script>
</body>
</html>
